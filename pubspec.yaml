name: legado_reader
description: "An iOS novel reader inspired by Legado"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # === State Management ===
  provider: ^6.1.2

  # === Network ===
  dio: ^5.7.0
  convert: ^3.1.1

  # === Database ===
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5

  # === HTML Parsing (replaces Android Jsoup) ===
  html: ^0.15.5
  html_unescape: ^2.0.0
  csslib: ^1.0.0

  # === JSON Path ===
  json_path: ^0.7.4

  # === XPath ===
  xpath_selector: ^3.0.2
  xpath_selector_html_parser: ^3.0.1

  # === JavaScript Engine (replaces Android Rhino) ===
  flutter_js: ^0.8.3

  # === Crypto (replaces Android hutool-crypto) ===
  crypto: ^3.0.6
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # === Image Loading ===
  cached_network_image: ^3.4.1

  # === Local File Support ===
  file_picker: ^8.1.7

  # === URL Launcher ===
  url_launcher: ^6.3.1

  # === Share ===
  share_plus: ^10.1.3

  # === WebView (for WebView book sources) ===
  webview_flutter: ^4.10.0

  # === Local Storage (key-value) ===
  shared_preferences: ^2.3.4

  # === UUID ===
  uuid: ^4.5.1

  # === Intl (date formatting, etc.) ===
  intl: ^0.19.0
  fast_gbk: ^1.0.0
  opencc: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/default_sources/
    - assets/fonts/

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont.ttf
